services:
  - type: web
    name: zayane-shop
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://zayane-api.onrender.com

  - type: web
    name: zayane-api
    runtime: docker
    plan: free
    healthCheckPath: /api/health.php
    envVars:
      - key: EASYPAY_MODE
        value: v2
      - key: EASYPAY_CID
        sync: false
      - key: EASYPAY_TOKEN
        sync: false
      - key: APP_BASE_URL
        value: https://zayane.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://zayane.onrender.com
      - key: USD_TO_CDF
        value: 2850
      - key: EASYPAY_SSL_VERIFY
        value: true

